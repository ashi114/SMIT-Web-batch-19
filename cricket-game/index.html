<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="name-wrapper" class="flex">
        <input type="text" id="name" placeholder="Please Enter Your Name">
        <button id="name-next">Next</button>
    </div>

    <div id="team-wrapper" class="none">
        <div class="team">Pakistan</div>
        <div class="team">Srilanka</div>
        <div class="team">England</div>
        <div class="team">New Zealand</div>
        <div class="team">Austrailia</div>
        <div class="team">SMIT Cheetah</div>

    </div>

    <div id="toss-wrapper" class="none">
        <div class="coin" id="1">Heads</div>
        <div class="coin" id="2">Tails</div>
    </div>

    <div id="batting-selection-wrapper" class="none">
        <div class="batting-option" id="Batting">Batting</div>
        <div class="batting-option" id="Bowling">Bowling</div>
    </div>



    <script src="app.js"></script>
</body>

</html>
